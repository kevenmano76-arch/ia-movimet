<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PANOPTICORE // ADVANCED TRACKER</title>
    <style>
        body { margin: 0; background: #000; color: #00FF00; font-family: 'Courier New', monospace; overflow: hidden; }
        #webcam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }
        #ui-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .titulo { font-size: 20px; letter-spacing: 3px; margin-bottom: 20px; text-shadow: 0 0 5px #00FF00; }
        button { background: transparent; border: 1px solid #00FF00; color: #00FF00; padding: 15px 30px; cursor: pointer; font-family: inherit; font-size: 16px; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="titulo">PANOPTICORE // ADVANCED TRACKER</div>
        <button id="btn-init">INITIALIZE SENSORS</button>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>

    <script>
        const video = document.getElementById('webcam');
        const canvas = document.getElementById('output');
        const ctx = canvas.getContext('2d');
        const btn = document.getElementById('btn-init');

        btn.onclick = async () => {
            btn.innerText = "CARREGANDO...";
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                video.srcObject = stream;
                video.style.display = 'block';
                document.getElementById('ui-overlay').style.display = 'none';

                const model = await cocoSsd.load();
                setInterval(async () => {
                    const predictions = await model.detect(video);
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    predictions.forEach(p => {
                        ctx.strokeStyle = '#00FF00';
                        ctx.strokeRect(p.bbox[0], p.bbox[1], p.bbox[2], p.bbox[3]);
                        ctx.strokeText(p.class, p.bbox[0], p.bbox[1] - 5);
                    });
                }, 100);
            } catch (err) {
                alert("Erro ao acessar câmera: " + err);
            }
        };
    </script>
</body>
</html>
