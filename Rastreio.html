<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="UTF-8">
    <title>Keven IA Pro</title>
    <style>
        body { margin: 0; background: black; font-family: monospace; color: #00FF00; overflow: hidden; height: 100vh; }
        #webcam { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 1; display: none; }
        canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        /* Tela Inicial */
        #tela-inicial { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .titulo-principal { font-size: 20px; font-weight: bold; letter-spacing: 2px; text-shadow: 0 0 10px #00FF00; margin-bottom: 30px; }
        .btn-iniciar { padding: 15px 25px; font-size: 14px; border: 2px solid #00FF00; background: transparent; color: #00FF00; cursor: pointer; margin: 10px; width: 280px; }
        
        /* Menu */
        .menu-container { position: fixed; bottom: 15px; right: 15px; z-index: 20; }
        .btn-menu { background: rgba(0,0,0,0.8); border: 1px solid #00FF00; color: #00FF00; padding: 10px 20px; cursor: pointer; }
        .menu-opcoes { position: absolute; bottom: 50px; right: 0; background: black; border: 1px solid #00FF00; display: none; flex-direction: column; min-width: 160px; }
        .menu-opcoes button { background: transparent; border: none; color: #00FF00; padding: 12px; text-align: left; cursor: pointer; border-bottom: 1px solid #111; }
        
        /* Modal Sobre */
        #modal-sobre { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 101; display: none; align-items: center; justify-content: center; }
        .modal-content { border: 1px solid #00FF00; padding: 20px; background: black; text-align: center; }
    </style>
</head>
<body>

    <div id="tela-inicial">
        <div class="titulo-principal">PANOPTICORE // ADVANCED TRACKER</div>
        <button class="btn-iniciar" onclick="iniciarModo('multiplo')">RASTREAMENTO DE KEVEN COM IA (MÚLTIPLO)</button>
        <button class="btn-iniciar" onclick="iniciarModo('unico')">RASTREAMENTO DE KEVEN COM IA (ÚNICO)</button>
    </div>

    <div class="menu-container" id="container-menu" style="display: none;">
        <button class="btn-menu" onclick="alternarMenu()">...</button>
        <div class="menu-opcoes" id="menu-opcoes">
            <button onclick="mudarCamera('user')">CÂMERA FRONTAL</button>
            <button onclick="mudarCamera('environment')">CÂMERA TRASEIRA</button>
            <button onclick="abrirSobre()">SOBRE NÓS</button>
        </div>
    </div>

    <div id="modal-sobre">
        <div class="modal-content">
            <p>Desenvolvido por Keven Manoel</p>
            <button onclick="fecharSobre()">X</button>
        </div>
    </div>

    <video id="webcam" autoplay playsinline muted></video>
    <canvas id="output"></canvas>

    <script>
        function iniciarModo(tipo) {
            if(tipo === 'multiplo') {
                alert("AVISO: O modo Múltiplo usa o COCO-SSD para rastrear animais e veículos. Ele é mais pesado e pode parecer mais travadinho.");
            } else {
                alert("AVISO: O modo Único usa MediaPipe. Focado exclusivamente em humanos, é instantâneo e de alta precisão.");
            }
            
            document.getElementById('tela-inicial').style.display = 'none';
            document.getElementById('container-menu').style.display = 'block';
            document.getElementById('webcam').style.display = 'block';
            
            navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
                .then(stream => { document.getElementById('webcam').srcObject = stream; });
        }

        function alternarMenu() {
            const m = document.getElementById('menu-opcoes');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function abrirSobre() { document.getElementById('modal-sobre').style.display = 'flex'; }
        function fecharSobre() { document.getElementById('modal-sobre').style.display = 'none'; }
        function mudarCamera(pos) { alert("Câmera alterada para " + pos); }
    </script>
</body>
</html>
